<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Fumigation Certificate</title>
  <link rel="icon" type="image/png" href="/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ── AUTH SCREEN ── -->
  <div id="auth-screen">
    <form class="auth-card card" id="login-form">
      <img src="/logo.png" alt="Bean Growers Australia" />
      <h2>Fumigation Certificates</h2>
      <p>Bean Growers Australia — sign in to continue</p>
      <div class="input-group">
        <input type="email" id="login-email" placeholder="Email" autocomplete="username" required />
      </div>
      <div class="input-group">
        <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="generate-btn" id="login-btn">Sign In</button>
      <div class="auth-error" id="login-error"></div>
    </form>
  </div>

  <!-- ── HEADER ── -->
  <div class="header" id="header" style="display:none">
    <img class="header-logo" src="/logo.png" alt="Logo" />
    <div class="header-text">
      <h1>Fumigation Certificate</h1>
      <p>Bean Growers Australia</p>
    </div>
    <div class="header-actions">
      <button class="ghost-btn" id="nav-history">History</button>
      <button class="ghost-btn" id="logout-btn">Sign out</button>
    </div>
  </div>

  <!-- ── FORM ── -->
  <div id="app" style="display:none">

    <!-- Container Details -->
    <div class="card">
      <div class="card-title">Container Details</div>
      <div class="row2">
        <div class="input-group">
          <label>Container No.</label>
          <input type="text" id="containerNo" placeholder="e.g. 13 20FT" />
        </div>
        <div class="input-group">
          <label>Size</label>
          <select id="volume">
            <option value="33.2">33.2 m³</option>
            <option value="76.3">76.3 m³</option>
          </select>
        </div>
      </div>

      <div class="input-group" style="margin-top: 16px;">
        <label>Fumigation Date <span class="badge">Sets all dates</span></label>
        <input type="date" id="fumDate" />
      </div>

      <div class="stats-container">
        <div class="stat-box">
          <span class="stat-label">Cert Date</span>
          <input type="date" id="certDate" class="stat-value" readonly />
        </div>
        <div class="stat-box">
          <span class="stat-label">Release <span class="badge" style="background:transparent;padding:0;color:var(--text-muted)">+10d</span></span>
          <input type="date" id="releaseDate" class="stat-value" readonly />
        </div>
        <div class="stat-box">
          <span class="stat-label">Available <span class="badge" style="background:transparent;padding:0;color:var(--text-muted)">+11d</span></span>
          <input type="date" id="availDate" class="stat-value" readonly />
        </div>
      </div>
    </div>

    <!-- Loading Details -->
    <div class="card">
      <div class="card-title">Loading Details</div>
      <div class="input-group">
        <label>Loaded From</label>
        <input type="text" id="loadedFrom" value="SHED" />
      </div>
      <div class="input-group">
        <label>Loaded By</label>
        <input type="text" id="loadedBy" list="loaders-list" placeholder="Select or type..." />
        <datalist id="loaders-list"></datalist>
      </div>
      <div class="stats-container">
        <div class="stat-box">
          <span class="stat-label">Load Date</span>
          <input type="date" id="loadDate" class="stat-value" readonly />
        </div>
        <div class="stat-box">
          <span class="stat-label">CHEP Count</span>
          <input type="number" id="chepCount" class="stat-value" readonly placeholder="Auto" style="font-size: 16px;" />
        </div>
      </div>
    </div>

    <!-- Lines -->
    <div class="card">
      <div class="card-title">Line Items</div>
      <div id="linesContainer"></div>
      <button class="add-line-btn" id="add-line-btn">+ Add Another Line</button>
    </div>

    <!-- Extra Details -->
    <div class="card">
      <div class="card-title">Extra Details</div>
      <div class="input-group">
        <label>Ventilation Period</label>
        <input type="text" id="ventPeriod" value="24 HOURS" />
      </div>
    </div>

    <button class="generate-btn" id="generate-btn">Generate &amp; Save Certificate</button>
    <button class="save-btn" id="save-btn" style="display:none">Save</button>
    <button class="reset-btn" id="reset-btn">Start New Certificate</button>
  </div>

  <!-- ── HISTORY ── -->
  <div id="history-view" style="display:none">
    <div id="history-app" style="padding: 20px 16px; max-width: 640px; margin: 0 auto;">
      <div class="card">
        <div class="card-title">Saved Certificates</div>
        <div class="input-group">
          <input type="search" id="history-search" placeholder="Search by container no..." />
        </div>
        <div id="history-list"></div>
      </div>
      <button class="reset-btn" id="history-back">← Back to New Certificate</button>
    </div>
  </div>

  <!-- ── PREVIEW ── -->
  <div id="cert-preview">
    <div class="cert-actions">
      <button class="btn-back" id="cert-back">← Back to Edit</button>
      <button class="btn-pdf" id="cert-pdf">Download PDF</button>
      <button class="btn-print" id="cert-print">Print</button>
    </div>
    <div class="cert-wrap">
      <div id="certificate"></div>
    </div>
  </div>

  <!-- ── TOAST ── -->
  <div id="toast" class="toast"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
